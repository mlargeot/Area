services:
  db:
    image: mongo:8.0.3
    container_name: "ar3m-db-dev"
    env_file:
      - ./env/mongo.env
    ports:
      - "27017:27017"
    volumes:
      - mongo-data-dev:/data/db

  server:
    container_name: ar3m-backend-dev
    build: ./backend/
    ports:
      - "8080:8080"
    depends_on:
      - db
    volumes:
      - ./backend:/app

