services:
  db:
    image: mongo:8.0.3
    container_name: "ar3m-db"
    env_file:
      - ./env/mongo.env
    volumes:
      - mongo-data:/data/db
    networks:
      - ar3m-db-networ
    restart: unless-stopped

  server:
    container_name: ar3m-backend
    build: ./backend/
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - ar3m-db-network
    restart: unless-stopped

  client_web:
    container_name: ar3m-frontend
    build: ./frontend/
    ports:
      - "8081:8081"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo-data-dev:

networks:
  ar3m-db-network:
